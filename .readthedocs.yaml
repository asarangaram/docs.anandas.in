# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the version of Python and other tools you might need
build:
  os: ubuntu-22.04
  tools:
    python: "3.10"

mkdocs:
  configuration: mkdocs.yml

# Python requirements required to build the docs.
# requirements.in is installed directly, so there is no compiled lockfile to
# keep in sync. If an upstream release ever breaks a build, pin that one
# package in requirements.in.
python:
  install:
    - requirements: requirements.in
